name: Main Release

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - src-tauri/**
      - scripts/**
      - flatpak/**
      - .github/workflows/main-release.yml

permissions:
  contents: write

concurrency:
  group: main-release
  cancel-in-progress: false

jobs:
  detect-version-bump:
    name: Detect version bump
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      release_name: ${{ steps.version.outputs.release_name }}
      release_body: ${{ steps.version.outputs.release_body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect package version bump
        id: version
        shell: bash
        run: |
          current_version="$(node -p "require('./package.json').version")"

          if git cat-file -e "${{ github.event.before }}:package.json" 2>/dev/null; then
            previous_version="$(git show "${{ github.event.before }}:package.json" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")"
          else
            previous_version=""
          fi

          if [[ -n "$previous_version" && "$previous_version" == "$current_version" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version=$current_version" >> "$GITHUB_OUTPUT"
          echo "tag_name=v${current_version}" >> "$GITHUB_OUTPUT"
          echo "release_name=DragonFruit v${current_version}" >> "$GITHUB_OUTPUT"
          {
            echo "release_body<<EOF"
            echo "Automated release for version ${current_version} from the main branch."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-tauri:
    name: Build ${{ matrix.artifact_name }}
    needs:
      - detect-version-bump
    if: needs.detect-version-bump.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin --bundles app,dmg
            artifact_name: dragonfruit-macos-arm64
          - platform: macos-latest
            args: --target x86_64-apple-darwin --bundles app,dmg
            artifact_name: dragonfruit-macos-x64
          - platform: ubuntu-22.04
            args: --target x86_64-unknown-linux-gnu --bundles deb,rpm
            artifact_name: dragonfruit-linux-x64
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc --bundles msi,nsis
            artifact_name: dragonfruit-windows-x64
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Add SSH private keys for submodule repositories
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.CTB_DEPLOY }}
            ${{ secrets.ELEGOO_DEPLOY }}
            ${{ secrets.SDCP_V3_DEPLOY }}

      - name: Checkout parent
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: false

      - name: Checkout submodules
        run: |
          git submodule sync
          git submodule update --init --recursive

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          APPIMAGE_EXTRACT_AND_RUN: ${{ matrix.platform == 'ubuntu-22.04' && '1' || '' }}
        with:
          tauriScript: npx tauri
          args: ${{ matrix.args }}

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/*/release/bundle/**
          if-no-files-found: error

  build-flatpak:
    name: Build dragonfruit-linux-flatpak-x64
    needs:
      - detect-version-bump
    if: needs.detect-version-bump.outputs.should_release == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Add SSH private keys for submodule repositories
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.CTB_DEPLOY }}
            ${{ secrets.ELEGOO_DEPLOY }}
            ${{ secrets.SDCP_V3_DEPLOY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: false

      - name: Checkout submodules
        run: |
          git submodule sync
          git submodule update --init --recursive

      - name: Install Linux system dependencies for Tauri/CEF
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Install AppStream + desktop-file validators
        run: sudo apt-get install -y appstream desktop-file-utils

      - name: Validate metainfo.xml
        run: appstreamcli validate --no-net flatpak/org.openresinalliance.dragonfruit.metainfo.xml

      - name: Validate .desktop
        run: desktop-file-validate flatpak/org.openresinalliance.dragonfruit.desktop

      - name: Build Tauri app (CEF variant on Linux)
        run: node scripts/tauri-build.mjs --bundles none

      - name: Stage CEF libraries next to binary
        run: bash scripts/bundle-cef-libs.sh

      - name: Build Flatpak bundle
        uses: flathub-infra/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: dragonfruit.flatpak
          manifest-path: flatpak/org.openresinalliance.dragonfruit.yml
          cache-key: flatpak-builder-${{ github.sha }}
          run-tests: false

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragonfruit-linux-flatpak-x64
          path: dragonfruit.flatpak
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs:
      - detect-version-bump
      - build-tauri
      - build-flatpak
    if: needs.detect-version-bump.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create tag if needed
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ needs.detect-version-bump.outputs.tag_name }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.TAG_NAME;
            const ref = `refs/tags/${tag}`;

            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              await github.rest.git.createRef({
                owner,
                repo,
                ref,
                sha: context.sha
              });
            }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect-version-bump.outputs.tag_name }}
          name: ${{ needs.detect-version-bump.outputs.release_name }}
          body: ${{ needs.detect-version-bump.outputs.release_body }}
          prerelease: false
          draft: false
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/**/*
