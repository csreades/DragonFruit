name: Main Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - src-tauri/**
      - scripts/**
      - flatpak/**
      - .github/workflows/main-release.yml

permissions:
  contents: write

concurrency:
  group: main-release
  cancel-in-progress: false

jobs:
  detect-version-bump:
    name: Detect version bump
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      release_name: ${{ steps.version.outputs.release_name }}
      release_body: ${{ steps.version.outputs.release_body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect package version bump
        id: version
        shell: bash
        run: |
          current_version="$(node -p "require('./package.json').version")"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$current_version" >> "$GITHUB_OUTPUT"
            echo "tag_name=v${current_version}" >> "$GITHUB_OUTPUT"
            echo "release_name=Pre-Release v${current_version}" >> "$GITHUB_OUTPUT"
            {
              echo "release_body<<EOF"
              echo "Manually triggered release for version ${current_version} from the main branch."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git cat-file -e "${{ github.event.before }}:package.json" 2>/dev/null; then
            previous_version="$(git show "${{ github.event.before }}:package.json" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")"
          else
            previous_version=""
          fi

          if [[ -n "$previous_version" && "$previous_version" == "$current_version" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version=$current_version" >> "$GITHUB_OUTPUT"
          echo "tag_name=v${current_version}" >> "$GITHUB_OUTPUT"
          echo "release_name=Pre-Release v${current_version}" >> "$GITHUB_OUTPUT"
          {
            echo "release_body<<EOF"
            echo "Automated release for version ${current_version} from the main branch."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-tauri:
    name: Build ${{ matrix.artifact_name }}
    needs:
      - detect-version-bump
    if: needs.detect-version-bump.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            build_kind: tauri
            args: --target universal-apple-darwin --bundles app,dmg
            artifact_name: dragonfruit-macos-universal
            cmake_archs: "arm64;x86_64"
            df_build_triple: universal-apple-darwin
          - platform: windows-latest
            build_kind: tauri
            args: --target x86_64-pc-windows-msvc --bundles nsis
            artifact_name: dragonfruit-windows-x64
          - platform: ubuntu-22.04
            build_kind: flatpak
            artifact_name: dragonfruit-linux-flatpak-x64
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundle
        if: matrix.build_kind == 'tauri'
        uses: tauri-apps/tauri-action@v0
        env:
          APPIMAGE_EXTRACT_AND_RUN: ${{ matrix.platform == 'ubuntu-22.04' && '1' || '' }}
          CMAKE_OSX_ARCHITECTURES: ${{ matrix.cmake_archs || '' }}
          DF_BUILD_TARGET_TRIPLE: ${{ matrix.df_build_triple || '' }}
          # Tauri updater signing — set these as repo secrets:
          # TAURI_SIGNING_PRIVATE_KEY — content of .tauri/app.key
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD — optional password set during key gen
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npx tauri
          args: ${{ matrix.args }}

      - name: Embed QuickLook extension + verify universal bundle
        if: matrix.platform == 'macos-latest'
        run: |
          node scripts/macos-embed-appex.mjs --target ${{ matrix.df_build_triple }}
          node scripts/verify-universal-bundle.mjs

      - name: Install AppStream + desktop-file validators
        if: matrix.build_kind == 'flatpak'
        run: sudo apt-get install -y appstream desktop-file-utils

      - name: Install Flatpak build tooling
        if: matrix.build_kind == 'flatpak'
        run: sudo apt-get install -y flatpak flatpak-builder

      - name: Prepare XDG runtime directory
        if: matrix.build_kind == 'flatpak'
        run: |
          mkdir -p "$RUNNER_TEMP/xdg-runtime"
          chmod 700 "$RUNNER_TEMP/xdg-runtime"
          echo "XDG_RUNTIME_DIR=$RUNNER_TEMP/xdg-runtime" >> "$GITHUB_ENV"

      - name: Configure Flathub remote
        if: matrix.build_kind == 'flatpak'
        run: |
          flatpak remote-add --user --if-not-exists \
            flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install Flatpak runtime dependencies (user)
        if: matrix.build_kind == 'flatpak'
        run: |
          flatpak --user install -y --noninteractive flathub \
            org.freedesktop.Sdk//24.08 \
            org.freedesktop.Platform//24.08

      - name: Build Tauri app (CEF variant on Linux)
        if: matrix.build_kind == 'flatpak'
        run: node scripts/tauri-build.mjs --target x86_64-unknown-linux-gnu --no-bundle

      - name: Upload installer + updater artifacts
        if: matrix.build_kind == 'tauri' && (matrix.platform == 'macos-latest' || matrix.platform == 'windows-latest')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.platform == 'macos-latest' && 'src-tauri/target/*/release/bundle/dmg/*' || 'src-tauri/target/*/release/bundle/nsis/*' }}
          if-no-files-found: error

      - name: Upload flatpak artifact
        if: matrix.build_kind == 'flatpak'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/release/bundle/flatpak/*.flatpak
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs:
      - detect-version-bump
      - build-tauri
    if: needs.detect-version-bump.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create tag if needed
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ needs.detect-version-bump.outputs.tag_name }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.TAG_NAME;
            const ref = `refs/tags/${tag}`;

            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              await github.rest.git.createRef({
                owner,
                repo,
                ref,
                sha: context.sha
              });
            }

      - name: Resolve release notes from matching dev prerelease
        id: release_notes
        uses: actions/github-script@v7
        env:
          VERSION: ${{ needs.detect-version-bump.outputs.version }}
          FALLBACK_BODY: ${{ needs.detect-version-bump.outputs.release_body }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const version = process.env.VERSION;
            const devTag = `dev_${version}`;
            let body = process.env.FALLBACK_BODY || "";

            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: devTag,
              });

              if (data?.body?.trim()) {
                body = data.body;
                core.info(`Using hand-written notes from prerelease ${devTag}`);
              } else {
                core.warning(`Prerelease ${devTag} has no body; using fallback notes.`);
              }
            } catch (error) {
              if (error.status === 404) {
                core.warning(`Prerelease ${devTag} not found; using fallback notes.`);
              } else {
                core.warning(`Failed fetching ${devTag}: ${error.message}; using fallback notes.`);
              }
            }

            core.setOutput("body", body);

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect-version-bump.outputs.tag_name }}
          name: ${{ needs.detect-version-bump.outputs.release_name }}
          body: ${{ steps.release_notes.outputs.body }}
          prerelease: false
          draft: false
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/**/*
