name: Build Tauri Bundles

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          # One universal macOS DMG (fat: native on Intel + Apple Silicon).
          # cmakeArchs / dfBuildTriple drive the universal build env (see the
          # build step below) — single source of truth, no duplicated literals.
          - platform: macos-latest
            args: --target universal-apple-darwin --bundles app,dmg
            artifactName: dragonfruit-macos-universal
            cmakeArchs: "arm64;x86_64"
            dfBuildTriple: universal-apple-darwin
          - platform: ubuntu-22.04
            args: --target x86_64-unknown-linux-gnu --bundles deb,rpm
            artifactName: dragonfruit-linux-x64
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc --bundles msi,nsis
            artifactName: dragonfruit-windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Add SSH private keys for submodule repositories
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.CTB_DEPLOY }}
            ${{ secrets.ELEGOO_DEPLOY }}
            ${{ secrets.SDCP_V3_DEPLOY }}

      - name: Checkout parent
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: false

      - name: Checkout submodule
        run: |
          git submodule sync
          git submodule update --init --recursive

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      # Build only — no release here. The macOS QuickLook .appex embed must run
      # before any upload, so every platform builds in this step and uploads in
      # the steps below. On macOS the universal env tells manifold's C++ to link
      # fat (CMAKE_OSX_ARCHITECTURES) and build-thumbnail-providers.mjs to emit a
      # universal sidecar (DF_BUILD_TARGET_TRIPLE); both are empty (ignored) off
      # macOS.
      - name: Build bundle (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          APPIMAGE_EXTRACT_AND_RUN: ${{ matrix.platform == 'ubuntu-22.04' && '1' || '' }}
          CMAKE_OSX_ARCHITECTURES: ${{ matrix.cmakeArchs || '' }}
          DF_BUILD_TARGET_TRIPLE: ${{ matrix.dfBuildTriple || '' }}
        with:
          tauriScript: npx tauri
          args: ${{ matrix.args }}

      # macOS only: tauri-action (`npx tauri build`) does not run this repo's
      # post-build, so embed the universal QuickLook .appex + re-sign + rebuild
      # the DMG here (the same module tauri-build.mjs uses locally), then assert
      # the bundle is fat + signed before it is uploaded.
      - name: Embed QuickLook extension + verify universal bundle (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          node scripts/macos-embed-appex.mjs --target ${{ matrix.dfBuildTriple }}
          node scripts/verify-universal-bundle.mjs

      - name: Upload workflow artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/*/release/bundle/**
          if-no-files-found: error

      # Tag release: build + embed already ran above, so we just upload the
      # finished bundles. Uses action-gh-release (not tauri-action's built-in
      # release) because the .appex embed must happen between build and upload —
      # tauri-action's release mode builds and uploads in one step. Each matrix
      # job upserts the same draft release with its own platform's assets.
      - name: Publish release (tag)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "DragonFruit ${{ github.ref_name }}"
          body: "See the assets to download this version and install."
          draft: true
          prerelease: false
          files: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/*/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/*/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/*/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/*/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/*/release/bundle/**/*.exe
