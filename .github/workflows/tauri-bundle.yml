name: Build Tauri Bundles

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin --bundles app,dmg
            artifactName: dragonfruit-macos-arm64
          - platform: macos-latest
            args: --target x86_64-apple-darwin --bundles app,dmg
            artifactName: dragonfruit-macos-x64
          - platform: ubuntu-22.04
            args: --target x86_64-unknown-linux-gnu --bundles deb,rpm
            artifactName: dragonfruit-linux-x64
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc --bundles msi,nsis
            artifactName: dragonfruit-windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Add SSH private keys for submodule repositories
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.CTB_DEPLOY }}
            ${{ secrets.ELEGOO_DEPLOY }}
            ${{ secrets.SDCP_V3_DEPLOY }}

      - name: Checkout parent
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: false

      - name: Checkout submodule
        run: |
          git submodule sync
          git submodule update --init --recursive

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build with tauri-action (workflow artifacts)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v0
        env:
          APPIMAGE_EXTRACT_AND_RUN: ${{ matrix.platform == 'ubuntu-22.04' && '1' || '' }}
        with:
          tauriScript: npx tauri
          args: ${{ matrix.args }}

      - name: Upload workflow artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/*/release/bundle/**
          if-no-files-found: error

      - name: Build with tauri-action (tag release)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: ${{ matrix.platform == 'ubuntu-22.04' && '1' || '' }}
        with:
          tauriScript: npx tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "DragonFruit ${{ github.ref_name }}"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
