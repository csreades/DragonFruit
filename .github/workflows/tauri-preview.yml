name: Tauri Preview Builds (Self-hosted)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  self-hosted-macos-preflight:
    runs-on:
      - self-hosted
      - macOS
    outputs:
      package_version: ${{ steps.version_check.outputs.package_version }}
      tauri_version: ${{ steps.version_check.outputs.tauri_version }}
      should_preview: ${{ steps.preview_decision.outputs.should_preview }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"

      - name: Ensure required CLI tools on self-hosted macOS
        shell: bash
        run: |
          set -euo pipefail

          # Ensure Cargo bin path is available for this and later steps.
          if [[ -d "$HOME/.cargo/bin" ]]; then
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi

          # Install Rust toolchain if missing.
          if ! command -v rustup >/dev/null 2>&1 || ! command -v cargo >/dev/null 2>&1; then
            echo "Rust toolchain missing; installing rustup/cargo..."
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi

          # Install Docker CLI if missing (best effort).
          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker CLI missing; attempting install via Homebrew..."
            if command -v brew >/dev/null 2>&1; then
              brew install docker || true
              if ! command -v docker >/dev/null 2>&1; then
                brew install --cask docker || true
              fi
            fi
          fi

          missing=()
          required_cmds=(git node npm rustup cargo docker)

          for cmd in "${required_cmds[@]}"; do
            if ! command -v "$cmd" >/dev/null 2>&1; then
              missing+=("$cmd")
            fi
          done

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "Missing required tools on self-hosted runner: ${missing[*]}"
            exit 1
          fi

      - name: Verify Docker daemon availability
        shell: bash
        run: |
          set -euo pipefail

          if docker info >/dev/null 2>&1; then
            exit 0
          fi

          echo "Docker daemon not reachable; attempting to launch Docker Desktop..."
          open -a Docker || true

          for _ in {1..18}; do
            if docker info >/dev/null 2>&1; then
              echo "Docker daemon is now available."
              exit 0
            fi
            sleep 5
          done

          echo "Docker daemon is still unavailable. Start Docker Desktop (or another Docker daemon) on the runner and retry."
          exit 1

      - name: Verify required Rust targets are installed
        shell: bash
        run: |
          set -euo pipefail

          required_targets=(
            aarch64-apple-darwin
            x86_64-apple-darwin
            x86_64-unknown-linux-gnu
            x86_64-pc-windows-gnu
          )

          installed_targets="$(rustup target list --installed)"
          missing_targets=()

          for target in "${required_targets[@]}"; do
            if ! grep -Fxq "$target" <<< "$installed_targets"; then
              missing_targets+=("$target")
            fi
          done

          if [[ ${#missing_targets[@]} -gt 0 ]]; then
            echo "Missing required Rust targets; installing: ${missing_targets[*]}"
            rustup target add "${missing_targets[@]}"
          fi

      - name: Validate package and Tauri versions
        id: version_check
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('./src-tauri/tauri.conf.json', 'utf8')).version")"

          if [[ -z "$PACKAGE_VERSION" || -z "$TAURI_VERSION" ]]; then
            echo "Unable to determine one or both app versions."
            exit 1
          fi

          if [[ "$PACKAGE_VERSION" != "$TAURI_VERSION" ]]; then
            echo "Version mismatch detected: package.json=$PACKAGE_VERSION, src-tauri/tauri.conf.json=$TAURI_VERSION"
            exit 1
          fi

          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tauri_version=${TAURI_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Decide whether preview build should run
        id: preview_decision
        shell: bash
        run: |
          set -euo pipefail

          if [[ '${{ github.ref }}' != 'refs/heads/main' ]]; then
            echo "should_preview=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION_TAG="v${{ steps.version_check.outputs.package_version }}"
          git fetch --force --tags origin

          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION_TAG}" >/dev/null 2>&1; then
            echo "Tag ${VERSION_TAG} already exists; running preview build."
            echo "should_preview=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${VERSION_TAG} does not exist; release workflow should handle this push."
            echo "should_preview=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate runner health summary
        shell: bash
        run: |
          set -euo pipefail

          SUMMARY_PATH="$RUNNER_TEMP/self-hosted-macos-health-summary.txt"
          {
            echo "DragonFruit self-hosted macOS preflight summary"
            echo "Generated (UTC): $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "Runner: ${RUNNER_NAME:-unknown}"
            echo "OS: ${RUNNER_OS:-unknown}"
            echo "Arch: ${RUNNER_ARCH:-unknown}"
            echo
            echo "## Tool versions"
            git --version
            node --version
            npm --version
            rustup --version
            cargo --version
            docker --version
            echo
            echo "## Installed Rust targets"
            rustup target list --installed | sort
            echo
            echo "## Version parity"
            echo "package.json=${{ steps.version_check.outputs.package_version }}"
            echo "src-tauri/tauri.conf.json=${{ steps.version_check.outputs.tauri_version }}"
            echo
            echo "## Preview decision"
            echo "should_preview=${{ steps.preview_decision.outputs.should_preview }}"
          } > "$SUMMARY_PATH"

      - name: Upload runner health summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: self-hosted-macos-health-summary
          path: ${{ runner.temp }}/self-hosted-macos-health-summary.txt
          if-no-files-found: error
          retention-days: 7

  build-preview:
    needs: self-hosted-macos-preflight
    if: ${{ needs.self-hosted-macos-preflight.outputs.should_preview == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app
            artifactName: dragonfruit-macos-arm64-preview-app
            artifactPath: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/DragonFruit.app
          - target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles app
            artifactName: dragonfruit-macos-x64-preview-app
            artifactPath: src-tauri/target/x86_64-apple-darwin/release/bundle/macos/DragonFruit.app
          - target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu --bundles none
            artifactName: dragonfruit-linux-x64-preview
            artifactPath: src-tauri/target/x86_64-unknown-linux-gnu/release/dragonfruit-desktop
          - target: x86_64-pc-windows-gnu
            args: --target x86_64-pc-windows-gnu --bundles none
            artifactName: dragonfruit-windows-x64-preview
            artifactPath: src-tauri/target/x86_64-pc-windows-gnu/release/dragonfruit-desktop.exe

    runs-on:
      - self-hosted
      - macOS

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build preview artifact
        uses: tauri-apps/tauri-action@v0
        with:
          tauriScript: npx tauri
          args: ${{ matrix.args }}

      - name: Upload preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: ${{ matrix.artifactPath }}
          if-no-files-found: error
          retention-days: 7
