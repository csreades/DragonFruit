name: Plugin Registry Guardrails

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-generated-plugin-registry:
    runs-on: ubuntu-latest

    steps:
      - name: Add SSH private keys for submodule repositories
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.CTB_DEPLOY }}
            ${{ secrets.ELEGOO_DEPLOY }}
            ${{ secrets.SDCP_V3_DEPLOY }}

      - name: Checkout parent
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: false

      - name: Checkout submodule
        run: |
          git submodule sync
          git submodule update --init --recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate plugin registries
        run: npm run generate:plugin-registry

      - name: Validate complex plugin allowlist
        run: npm run check:plugin-allowlist

      - name: Smoke-check generated plugin registries
        run: npm run check:generated-plugin-registry

      - name: Ensure generated files are committed
        run: |
          git diff -- src/features/plugins/generatedBuiltinComplexPlugins.ts
          git diff -- src/features/plugins/generatedBuiltinComplexPluginNetworkHandlers.ts
          git diff -- src/features/plugins/generatedBuiltinComplexPluginUploadHandlers.ts
          git diff -- src-tauri/src/generated_builtin_plugins.rs
          git diff -- rust/dragonfruit-slicing-engine/src/encoders/generated_plugin_encoders.rs
          git diff --exit-code -- src/features/plugins/generatedBuiltinComplexPlugins.ts src/features/plugins/generatedBuiltinComplexPluginNetworkHandlers.ts src/features/plugins/generatedBuiltinComplexPluginUploadHandlers.ts src-tauri/src/generated_builtin_plugins.rs rust/dragonfruit-slicing-engine/src/encoders/generated_plugin_encoders.rs
