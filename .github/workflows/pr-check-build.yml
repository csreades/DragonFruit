name: PR macOS Build Check

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  macos-build:
    name: macOS compile check (Universal)
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit_hash: ${{ steps.version.outputs.commit_hash }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Apple Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASS }}

      - name: Fall back to ad-hoc signing if Developer ID cert is unavailable
        shell: bash
        run: |
          if ! security find-identity -v -p codesigning 2>/dev/null | grep -q "Developer ID Application: Pascal Krumme (MHNF3GA2MM)"; then
            echo "⚠️ Developer ID certificate not found in keychain — falling back to ad-hoc signing"
            node -e "
              const fs = require('fs');
              const p = 'src-tauri/tauri.macos.conf.json';
              const cfg = JSON.parse(fs.readFileSync(p, 'utf8'));
              cfg.bundle.macOS.signingIdentity = '-';
              fs.writeFileSync(p, JSON.stringify(cfg, null, 2) + '\n');
            "
          else
            echo "✅ Developer ID certificate available — using full codesigning"
          fi

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Derive version info
        id: version
        shell: bash
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          echo "commit_hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Export Apple notarization credentials for nightly builds
        if: contains(github.event.pull_request.labels.*.name, 'nightly-build')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          echo "APPLE_ID=$APPLE_ID" >> "$GITHUB_ENV"
          echo "APPLE_PASSWORD=$APPLE_PASSWORD" >> "$GITHUB_ENV"

      - name: Build Tauri universal macOS bundle
        uses: tauri-apps/tauri-action@v0
        env:
          CMAKE_OSX_ARCHITECTURES: "arm64;x86_64"
          DF_BUILD_TARGET_TRIPLE: universal-apple-darwin
          # Tauri updater signing — set these as repo secrets:
          # TAURI_SIGNING_PRIVATE_KEY — content of .tauri/app.key
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD — optional password set during key gen
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npx tauri
          args: --target universal-apple-darwin --bundles app,dmg

      - name: Embed QuickLook extension + verify universal bundle
        run: |
          node scripts/macos-embed-appex.mjs --target universal-apple-darwin
          node scripts/verify-universal-bundle.mjs

      - name: Rename DMG for nightly handoff
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT_HASH: ${{ steps.version.outputs.commit_hash }}
        run: |
          nightly_tag="pr-${COMMIT_HASH}_${VERSION}_DragonFruit_nightly"

          for f in src-tauri/target/*/release/bundle/dmg/*.dmg; do
            [ -e "$f" ] && mv -v "$f" "$(dirname "$f")/${nightly_tag}.dmg"
          done

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/*/release/bundle/dmg/*_DragonFruit_nightly.dmg
          if-no-files-found: error

  comment-status:
    name: Comment macOS build status
    runs-on: ubuntu-latest
    needs:
      - macos-build
    if: always()
    steps:
      - name: Upsert PR status comment
        uses: actions/github-script@v7
        env:
          BUILD_RESULT: ${{ needs.macos-build.result }}
        with:
          script: |
            const marker = "<!-- dragonfruit-macos-build-status -->";
            const result = process.env.BUILD_RESULT;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const emojiMap = {
              success: "✅",
              failure: "❌",
              cancelled: "⚠️",
              skipped: "⏭️",
            };

            const statusMap = {
              success: {
                icon: emojiMap.success,
                title: "Compilation Succeeded",
                badge: "Passed",
                color: "brightgreen",
                body: "The PR compiled successfully for macOS (Universal)."
              },
              failure: {
                icon: emojiMap.failure,
                title: "Compilation Failed",
                badge: "Failed",
                color: "red",
                body: "The macOS compile check failed. Please inspect the workflow logs for details."
              },
              cancelled: {
                icon: emojiMap.cancelled,
                title: "Compilation Cancelled",
                badge: "Cancelled",
                color: "yellow",
                body: "The macOS compile check did not finish because the workflow was cancelled."
              }
            };

            const status = statusMap[result] ?? {
              icon: emojiMap.skipped,
              title: `Compilation Ended: ${result}`,
              badge: result,
              color: "grey",
              body: "The macOS compile check finished with a non-standard result."
            };

            const commitSha = context.payload.pull_request?.head?.sha?.slice(0, 7) || "unknown";
            const branch = context.payload.pull_request?.head?.ref || "unknown";

            const body = [
              marker,
              `## ${status.icon} macOS Build Check — ${status.title}`,
              "",
              `| | |`,
              `|---|---|`,
              `| **Result** | ${status.badge} |`,
              `| **Branch** | \`${branch}\` |`,
              `| **Commit** | \`${commitSha}\` |`,
              `| **Workflow** | [View run](${runUrl}) |`,
              "",
              `${status.body}`,
              "",
              "---",
              "",
              "> 💡 This check runs automatically on every push to the PR. The macOS DMG is handed off to the nightly workflow when the `nightly-build` label is set."
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });

  dispatch-nightly:
    name: Dispatch nightly build if labeled
    needs:
      - macos-build
    if: >
      success() &&
      contains(github.event.pull_request.labels.*.name, 'nightly-build')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      pull-requests: write
      contents: read
    steps:
      - name: Dispatch build-nightly workflow
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.head_ref }}
          BASE_BRANCH: ${{ github.base_ref }}
          RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh workflow run build-nightly.yml \
            --repo "${{ github.repository }}" \
            --ref "$BASE_BRANCH" \
            -f branch="$HEAD_BRANCH" \
            -f pr_run_id="$RUN_ID" \
            -f pr_number="$PR_NUMBER"
