name: PR Linux Build Check

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  linux-build:
    name: Linux compile check
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Compile Linux bundle
        uses: tauri-apps/tauri-action@v0
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        with:
          tauriScript: npx tauri
          args: --target x86_64-unknown-linux-gnu --bundles deb,rpm

  comment-status:
    name: Comment Linux build status
    runs-on: ubuntu-latest
    needs:
      - linux-build
    if: always()
    steps:
      - name: Upsert PR status comment
        uses: actions/github-script@v7
        env:
          BUILD_RESULT: ${{ needs.linux-build.result }}
        with:
          script: |
            const marker = "<!-- dragonfruit-linux-build-status -->";
            const result = process.env.BUILD_RESULT;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const emojiMap = {
              success: "✅",
              failure: "❌",
              cancelled: "⚠️",
              skipped: "⏭️",
            };

            const statusMap = {
              success: {
                icon: emojiMap.success,
                title: "Compilation Succeeded",
                badge: "Passed",
                color: "brightgreen",
                body: "The PR compiled successfully for Linux."
              },
              failure: {
                icon: emojiMap.failure,
                title: "Compilation Failed",
                badge: "Failed",
                color: "red",
                body: "The Linux compile check failed. Please inspect the workflow logs for details."
              },
              cancelled: {
                icon: emojiMap.cancelled,
                title: "Compilation Cancelled",
                badge: "Cancelled",
                color: "yellow",
                body: "The Linux compile check did not finish because the workflow was cancelled."
              }
            };

            const status = statusMap[result] ?? {
              icon: emojiMap.skipped,
              title: `Compilation Ended: ${result}`,
              badge: result,
              color: "grey",
              body: "The Linux compile check finished with a non-standard result."
            };

            const commitSha = context.payload.pull_request?.head?.sha?.slice(0, 7) || "unknown";
            const branch = context.payload.pull_request?.head?.ref || "unknown";

            const body = [
              marker,
              `## ${status.icon} Linux Build Check — ${status.title}`,
              "",
              `| | |`,
              `|---|---|`,
              `| **Result** | ${status.badge} |`,
              `| **Branch** | \`${branch}\` |`,
              `| **Commit** | \`${commitSha}\` |`,
              `| **Workflow** | [View run](${runUrl}) |`,
              "",
              `${status.body}`,
              "",
              "---",
              "",
              "> 💡 This check runs automatically on every push to the PR."
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });
