name: PR Linux Build Check

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  linux-build:
    name: Linux compile check
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit_hash: ${{ steps.version.outputs.commit_hash }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Derive version info
        id: version
        shell: bash
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          echo "commit_hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compile Linux bundle
        uses: tauri-apps/tauri-action@v0
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        with:
          tauriScript: npx tauri
          args: --target x86_64-unknown-linux-gnu --bundles deb,rpm

      - name: Install Flatpak build tooling
        run: sudo apt-get install -y flatpak flatpak-builder appstream desktop-file-utils

      - name: Prepare XDG runtime directory
        run: |
          mkdir -p "$RUNNER_TEMP/xdg-runtime"
          chmod 700 "$RUNNER_TEMP/xdg-runtime"
          echo "XDG_RUNTIME_DIR=$RUNNER_TEMP/xdg-runtime" >> "$GITHUB_ENV"

      - name: Configure Flathub remote
        run: |
          flatpak remote-add --user --if-not-exists \
            flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install Flatpak runtime dependencies (user)
        run: |
          flatpak --user install -y --noninteractive flathub \
            org.freedesktop.Sdk//24.08 \
            org.freedesktop.Platform//24.08

      - name: Build Tauri app for Flatpak
        run: node scripts/tauri-build.mjs --target x86_64-unknown-linux-gnu --no-bundle

      - name: Rename Linux artifacts for nightly release
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT_HASH: ${{ steps.version.outputs.commit_hash }}
        run: |
          nightly_tag="pr-${COMMIT_HASH}_${VERSION}_DragonFruit_nightly"

          for f in src-tauri/target/release/bundle/deb/*.deb; do
            [ -e "$f" ] && mv -v "$f" "$(dirname "$f")/${nightly_tag}.deb"
          done

          for f in src-tauri/target/release/bundle/rpm/*.rpm; do
            [ -e "$f" ] && mv -v "$f" "$(dirname "$f")/${nightly_tag}.rpm"
          done

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: src-tauri/target/release/bundle/deb/*_DragonFruit_nightly.deb
          if-no-files-found: error

      - name: Upload rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: src-tauri/target/release/bundle/rpm/*_DragonFruit_nightly.rpm
          if-no-files-found: error

      - name: Upload flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: src-tauri/target/release/bundle/flatpak/*.flatpak
          if-no-files-found: error

  comment-status:
    name: Comment Linux build status
    runs-on: ubuntu-latest
    needs:
      - linux-build
    if: always()
    steps:
      - name: Upsert PR status comment
        uses: actions/github-script@v7
        env:
          BUILD_RESULT: ${{ needs.linux-build.result }}
        with:
          script: |
            const marker = "<!-- dragonfruit-linux-build-status -->";
            const result = process.env.BUILD_RESULT;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const emojiMap = {
              success: "✅",
              failure: "❌",
              cancelled: "⚠️",
              skipped: "⏭️",
            };

            const statusMap = {
              success: {
                icon: emojiMap.success,
                title: "Compilation Succeeded",
                badge: "Passed",
                color: "brightgreen",
                body: "The PR compiled successfully for Linux."
              },
              failure: {
                icon: emojiMap.failure,
                title: "Compilation Failed",
                badge: "Failed",
                color: "red",
                body: "The Linux compile check failed. Please inspect the workflow logs for details."
              },
              cancelled: {
                icon: emojiMap.cancelled,
                title: "Compilation Cancelled",
                badge: "Cancelled",
                color: "yellow",
                body: "The Linux compile check did not finish because the workflow was cancelled."
              }
            };

            const status = statusMap[result] ?? {
              icon: emojiMap.skipped,
              title: `Compilation Ended: ${result}`,
              badge: result,
              color: "grey",
              body: "The Linux compile check finished with a non-standard result."
            };

            const commitSha = context.payload.pull_request?.head?.sha?.slice(0, 7) || "unknown";
            const branch = context.payload.pull_request?.head?.ref || "unknown";

            const body = [
              marker,
              `## ${status.icon} Linux Build Check — ${status.title}`,
              "",
              `| | |`,
              `|---|---|`,
              `| **Result** | ${status.badge} |`,
              `| **Branch** | \`${branch}\` |`,
              `| **Commit** | \`${commitSha}\` |`,
              `| **Workflow** | [View run](${runUrl}) |`,
              "",
              `${status.body}`,
              "",
              "---",
              "",
              "> 💡 This check runs automatically on every push to the PR."
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });

  dispatch-nightly:
    name: Dispatch nightly build if labeled
    needs:
      - linux-build
    if: >
      success() &&
      contains(github.event.pull_request.labels.*.name, 'nightly-build')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      pull-requests: write
      contents: read
    steps:
      - name: Dispatch build-nightly workflow
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.head_ref }}
          BASE_BRANCH: ${{ github.base_ref }}
          RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh workflow run build-nightly.yml \
            --repo "${{ github.repository }}" \
            --ref "$BASE_BRANCH" \
            -f branch="$HEAD_BRANCH" \
            -f skip_linux=true \
            -f pr_run_id="$RUN_ID" \
            -f pr_number="$PR_NUMBER"
