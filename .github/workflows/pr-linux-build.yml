name: PR Linux Build Check

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  linux-build:
    name: Linux compile check
    runs-on: ubuntu-22.04
    steps:
      - name: Add SSH private keys for submodule repositories
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.CTB_DEPLOY }}
            ${{ secrets.ELEGOO_DEPLOY }}
            ${{ secrets.SDCP_V3_DEPLOY }}

      - name: Checkout parent
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: false

      - name: Checkout submodules
        run: |
          git submodule sync
          git submodule update --init --recursive

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Compile Linux bundle
        uses: tauri-apps/tauri-action@v0
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        with:
          tauriScript: npx tauri
          args: --target x86_64-unknown-linux-gnu --bundles deb,rpm

  comment-status:
    name: Comment Linux build status
    runs-on: ubuntu-latest
    needs:
      - linux-build
    if: always()
    steps:
      - name: Upsert PR status comment
        uses: actions/github-script@v7
        env:
          BUILD_RESULT: ${{ needs.linux-build.result }}
        with:
          script: |
            const marker = "<!-- dragonfruit-linux-build-status -->";
            const result = process.env.BUILD_RESULT;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const statusMap = {
              success: {
                title: "Linux build check passed",
                body: "The PR compiled successfully for Linux."
              },
              failure: {
                title: "Linux build check failed",
                body: "The Linux compile check failed. Please inspect the workflow logs."
              },
              cancelled: {
                title: "Linux build check was cancelled",
                body: "The Linux compile check did not finish because the workflow was cancelled."
              }
            };

            const status = statusMap[result] ?? {
              title: `Linux build check ended with status: ${result}`,
              body: "The Linux compile check finished with a non-standard result."
            };

            const body = [
              marker,
              `## ${status.title}`,
              status.body,
              "",
              `[View workflow run](${runUrl})`
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });
