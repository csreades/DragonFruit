name: Dev Prerelease

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - package.json
      - package-lock.json
      - src-tauri/**
      - scripts/**
      - flatpak/**
      - .github/workflows/dev-prerelease.yml

permissions:
  contents: write

concurrency:
  group: dev-prerelease
  cancel-in-progress: false

jobs:
  detect-version-bump:
    name: Detect version bump
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      release_name: ${{ steps.version.outputs.release_name }}
      release_body: ${{ steps.version.outputs.release_body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect package version bump
        id: version
        shell: bash
        run: |
          current_version="$(node -p "require('./package.json').version")"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$current_version" >> "$GITHUB_OUTPUT"
            echo "tag_name=dev_${current_version}" >> "$GITHUB_OUTPUT"
            echo "release_name=DragonFruit dev_${current_version}" >> "$GITHUB_OUTPUT"
            {
              echo "release_body<<EOF"
              echo "Manually triggered prerelease for version ${current_version} from the dev branch."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git cat-file -e "${{ github.event.before }}:package.json" 2>/dev/null; then
            previous_version="$(git show "${{ github.event.before }}:package.json" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")"
          else
            previous_version=""
          fi

          if [[ -n "$previous_version" && "$previous_version" == "$current_version" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version=$current_version" >> "$GITHUB_OUTPUT"
          echo "tag_name=dev_${current_version}" >> "$GITHUB_OUTPUT"
          echo "release_name=DragonFruit dev_${current_version}" >> "$GITHUB_OUTPUT"
          {
            echo "release_body<<EOF"
            echo "Automated prerelease for version ${current_version} from the dev branch."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-tauri:
    name: Build ${{ matrix.artifact_name }}
    needs:
      - detect-version-bump
    if: needs.detect-version-bump.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            build_kind: tauri
            args: --target universal-apple-darwin --bundles app,dmg
            artifact_name: dragonfruit-macos-universal
            cmake_archs: "arm64;x86_64"
            df_build_triple: universal-apple-darwin
          - platform: ubuntu-22.04
            build_kind: tauri
            args: --target x86_64-unknown-linux-gnu --bundles deb,rpm
            artifact_name: dragonfruit-linux-x64
          - platform: windows-latest
            build_kind: tauri
            args: --target x86_64-pc-windows-msvc --bundles msi,nsis
            artifact_name: dragonfruit-windows-x64
          - platform: ubuntu-22.04
            build_kind: flatpak
            artifact_name: dragonfruit-linux-flatpak-x64
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Add SSH private keys for submodule repositories
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.CTB_DEPLOY }}
            ${{ secrets.ELEGOO_DEPLOY }}
            ${{ secrets.SDCP_V3_DEPLOY }}

      - name: Checkout parent
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: false

      - name: Checkout submodules
        run: |
          git submodule sync
          git submodule update --init --recursive

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundle
        if: matrix.build_kind == 'tauri'
        uses: tauri-apps/tauri-action@v0
        env:
          APPIMAGE_EXTRACT_AND_RUN: ${{ matrix.platform == 'ubuntu-22.04' && '1' || '' }}
          CMAKE_OSX_ARCHITECTURES: ${{ matrix.cmake_archs || '' }}
          DF_BUILD_TARGET_TRIPLE: ${{ matrix.df_build_triple || '' }}
        with:
          tauriScript: npx tauri
          args: ${{ matrix.args }}

      - name: Embed QuickLook extension + verify universal bundle
        if: matrix.platform == 'macos-latest'
        run: |
          node scripts/macos-embed-appex.mjs --target ${{ matrix.df_build_triple }}
          node scripts/verify-universal-bundle.mjs

      - name: Install AppStream + desktop-file validators
        if: matrix.build_kind == 'flatpak'
        run: sudo apt-get install -y appstream desktop-file-utils

      - name: Install Flatpak build tooling
        if: matrix.build_kind == 'flatpak'
        run: sudo apt-get install -y flatpak flatpak-builder

      - name: Prepare XDG runtime directory
        if: matrix.build_kind == 'flatpak'
        run: |
          mkdir -p "$RUNNER_TEMP/xdg-runtime"
          chmod 700 "$RUNNER_TEMP/xdg-runtime"
          echo "XDG_RUNTIME_DIR=$RUNNER_TEMP/xdg-runtime" >> "$GITHUB_ENV"

      - name: Configure Flathub remote
        if: matrix.build_kind == 'flatpak'
        run: |
          flatpak remote-add --user --if-not-exists \
            flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install Flatpak runtime dependencies (user)
        if: matrix.build_kind == 'flatpak'
        run: |
          flatpak --user install -y --noninteractive flathub \
            org.freedesktop.Sdk//24.08 \
            org.freedesktop.Platform//24.08

      - name: Build Tauri app (CEF variant on Linux)
        if: matrix.build_kind == 'flatpak'
        run: node scripts/tauri-build.mjs --target x86_64-unknown-linux-gnu --no-bundle

      - name: Upload bundle artifact
        if: matrix.build_kind == 'tauri'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/*/release/bundle/**
          if-no-files-found: error

      - name: Upload flatpak artifact
        if: matrix.build_kind == 'flatpak'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/release/bundle/flatpak/*.flatpak
          if-no-files-found: error

  publish-prerelease:
    name: Publish prerelease
    needs:
      - detect-version-bump
      - build-tauri
    if: needs.detect-version-bump.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create tag if needed
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ needs.detect-version-bump.outputs.tag_name }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.TAG_NAME;
            const ref = `refs/tags/${tag}`;

            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              await github.rest.git.createRef({
                owner,
                repo,
                ref,
                sha: context.sha
              });
            }

      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect-version-bump.outputs.tag_name }}
          name: ${{ needs.detect-version-bump.outputs.release_name }}
          body: ${{ needs.detect-version-bump.outputs.release_body }}
          prerelease: true
          draft: false
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/**/*
