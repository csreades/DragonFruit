name: Build Nightly

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to build the nightly release from
        required: true
        type: string
        default: dev
  pull_request:
    types:
      - labeled
      - synchronize
  issue_comment:
    types:
      - created

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: nightly-${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.head_ref }}
  cancel-in-progress: true

env:
  NIGHTLY_LABEL: nightly-build

jobs:
  # ── Comment handler: /nightly or @github-actions build nightly ──────────
  activate-nightly:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      (startsWith(github.event.comment.body, '/nightly') ||
       startsWith(github.event.comment.body, '@github-actions build nightly'))
    runs-on: ubuntu-latest
    permissions:
      actions: write
      pull-requests: write
      contents: read
    steps:
      - name: Check commenter has write access
        id: check_access
        uses: actions/github-script@v7
        env:
          COMMENT_USER: ${{ github.event.comment.user.login }}
        with:
          result-encoding: string
          script: |
            const commentUser = process.env.COMMENT_USER;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ADMIN_TEAM = 'administrators';

            // Check 1 — direct collaborator with write+ access
            let hasWrite = false;
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner,
                repo,
                username: commentUser,
              });
              hasWrite = ['write', 'admin', 'maintain'].includes(data.permission);
              core.info(`Repo permission: ${data.permission} → ${hasWrite ? 'granted' : 'denied'}.`);
            } catch (e) {
              if (e.status !== 404) throw e;
              core.info(`User is not a direct collaborator.`);
            }

            // Check 2 — override: member of the administrators team
            let isAdmin = false;
            try {
              const { data } = await github.rest.teams.getMembershipForUserInOrg({
                org: owner,
                team_slug: ADMIN_TEAM,
                username: commentUser,
              });
              isAdmin = data.state === 'active' || data.state === 'pending';
              if (isAdmin) core.info(`User is a member of @${owner}/${ADMIN_TEAM} — override granted.`);
            } catch (e) {
              if (e.status !== 404) throw e;
              core.info(`User is not a member of @${owner}/${ADMIN_TEAM}.`);
            }

            if (hasWrite || isAdmin) return 'granted';
            return 'denied';

      - name: Abort if not authorized
        if: steps.check_access.outputs.result != 'granted'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$PR" \
            --repo "${{ github.repository }}" \
            --body $'### ❌ Access Denied\n\nSorry, only **collaborators with write access** can trigger nightly builds.\n\nIf you believe this is a mistake, please contact a maintainer.'

      - name: Fetch PR head branch
        id: pr_info
        if: steps.check_access.outputs.result == 'granted'
        uses: actions/github-script@v7
        env:
          PR: ${{ github.event.issue.number }}
        with:
          result-encoding: string
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt(process.env.PR),
            });
            return pr.head.ref;

      - name: Add nightly-build label
        if: steps.check_access.outputs.result == 'granted'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.issue.number }}
        run: |
          gh issue edit "$PR" --add-label "${{ env.NIGHTLY_LABEL }}" --repo "${{ github.repository }}"

      - name: Trigger immediate nightly build
        if: steps.check_access.outputs.result == 'granted'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.pr_info.outputs.result }}
        run: |
          gh workflow run build-nightly.yml \
            --repo "${{ github.repository }}" \
            --ref "$BRANCH" \
            -f branch="$BRANCH"

      - name: Acknowledge activation
        if: steps.check_access.outputs.result == 'granted'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.issue.number }}
          BRANCH: ${{ steps.pr_info.outputs.result }}
        run: |
          gh issue comment "$PR" \
            --repo "${{ github.repository }}" \
            --body $'### 🚀 Nightly Build Triggered\n\nA nightly build has been dispatched for branch **`'"${BRANCH}"$'**\n\n| What | How |\n|------|-----|\n| **This build** | Check the [Actions tab]('"${{ github.server_url }}/${{ github.repository }}/actions/workflows/build-nightly.yml"$') for progress |\n| **Future commits** | Every new push to this PR will automatically rebuild |\n| **Deactivate** | Remove the `nightly-build` label to stop auto-builds |\n\n> The pre-release tag will be updated in-place so the download link stays the same.'

  # ── Derive metadata (branch, tag, names) ────────────────────────────────
  derive:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'nightly-build'))
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch.outputs.branch }}
      safe_branch: ${{ steps.meta.outputs.safe_branch }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      version: ${{ steps.meta.outputs.version }}
      commit_hash: ${{ steps.meta.outputs.commit_hash }}
      is_pr: ${{ steps.meta.outputs.is_pr }}
      pr_number: ${{ steps.meta.outputs.pr_number }}
    steps:
      - name: Determine branch
        id: branch
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "branch=${{ inputs.branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.branch }}
          submodules: recursive
          fetch-depth: 0

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          commit_hash="$(git rev-parse --short HEAD)"
          branch_name="${{ steps.branch.outputs.branch }}"

          # Sanitize branch name for tags / filenames
          safe_branch="${branch_name//\//_}"

          # Human-readable release name
          human_name="$branch_name"
          case "$branch_name" in
            feat/*) human_name="Feature: ${branch_name#feat/}" ;;
            fix/*)  human_name="Fix: ${branch_name#fix/}" ;;
            chore/*) human_name="Chore: ${branch_name#chore/}" ;;
            refactor/*) human_name="Refactor: ${branch_name#refactor/}" ;;
            docs/*) human_name="Docs: ${branch_name#docs/}" ;;
            perf/*) human_name="Perf: ${branch_name#perf/}" ;;
            ci/*)   human_name="CI: ${branch_name#ci/}" ;;
            *)      human_name="Nightly: ${branch_name}" ;;
          esac

          # Capitalize the descriptive part
          rest="${human_name#*: }"
          prefix="${human_name%%: *}"
          first_char="$(printf '%s' "${rest:0:1}" | tr '[:lower:]' '[:upper:]')"
          capitalized="${first_char}${rest:1}"
          human_name="${prefix}: ${capitalized}"

          release_tag="nightly_${safe_branch}"

          echo "branch=${branch_name}" >> "$GITHUB_OUTPUT"
          echo "safe_branch=${safe_branch}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=${human_name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "commit_hash=${commit_hash}" >> "$GITHUB_OUTPUT"
          echo "is_pr=${{ github.event_name == 'pull_request' && 'true' || 'false' }}" >> "$GITHUB_OUTPUT"
          echo "pr_number=${{ github.event.pull_request.number || '' }}" >> "$GITHUB_OUTPUT"

  # ── Gate: wait for PR Linux build to pass ───────────────────────────────
  check-pr-build:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'nightly-build'))
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.check.outputs.status }}
    steps:
      - name: Skip gate for manual triggers
        if: github.event_name == 'workflow_dispatch'
        run: echo "Manual trigger — no PR build to wait for."

      - name: Wait for PR Linux build check to complete
        id: check
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = process.env.HEAD_SHA;
            const workflowName = 'PR Linux Build Check';
            const pollIntervalMs = 60_000;
            const maxAttempts = 45;  // 45 minutes total

            core.info(`Waiting for ${workflowName} to pass on commit ${headSha}...`);

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              // List check runs for the head commit
              const { data } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: headSha,
              });

              const prBuildRun = data.check_runs.find(
                (run) => run.name.includes(workflowName) || run.name === 'linux-build',
              );

              if (!prBuildRun) {
                core.info(`Attempt ${attempt}/${maxAttempts}: No PR build check run found yet. Retrying in 60s...`);
                await new Promise((r) => setTimeout(r, pollIntervalMs));
                continue;
              }

              const status = prBuildRun.conclusion || 'in_progress';
              const name = prBuildRun.name;
              core.info(
                `Attempt ${attempt}/${maxAttempts}: ${name} → status=${prBuildRun.status}, conclusion=${prBuildRun.conclusion}`
              );

              if (prBuildRun.status !== 'completed') {
                core.info(`Still in progress. Retrying in 60s...`);
                await new Promise((r) => setTimeout(r, pollIntervalMs));
                continue;
              }

              if (status === 'success') {
                core.info(`PR build check passed! Proceeding with nightly.`);
                core.setOutput('status', 'passed');
                return;
              }

              core.setFailed(
                `PR Linux build check finished with status: ${status}. ` +
                `Nightly build aborted — compilation would likely fail.`
              );
              return;
            }

            core.setFailed(
              `Timed out after ${maxAttempts * pollIntervalMs / 60_000} minutes waiting for ` +
              `the PR Linux build check to complete. Aborting nightly.`
            );

  # ── Build matrix ────────────────────────────────────────────────────────
  build-tauri:
    name: Build ${{ matrix.artifact_name }}
    needs:
      - derive
      - check-pr-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            build_kind: tauri
            args: --target universal-apple-darwin --bundles app,dmg
            artifact_name: dragonfruit-macos-universal
            cmake_archs: "arm64;x86_64"
            df_build_triple: universal-apple-darwin
          - platform: windows-latest
            build_kind: tauri
            args: --target x86_64-pc-windows-msvc --bundles nsis
            artifact_name: dragonfruit-windows-x64
          - platform: ubuntu-22.04
            build_kind: flatpak
            artifact_name: dragonfruit-linux-flatpak-x64
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.derive.outputs.branch }}
          submodules: recursive

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundle
        if: matrix.build_kind == 'tauri'
        uses: tauri-apps/tauri-action@v0
        env:
          APPIMAGE_EXTRACT_AND_RUN: ${{ matrix.platform == 'ubuntu-22.04' && '1' || '' }}
          CMAKE_OSX_ARCHITECTURES: ${{ matrix.cmake_archs || '' }}
          DF_BUILD_TARGET_TRIPLE: ${{ matrix.df_build_triple || '' }}
        with:
          tauriScript: npx tauri
          args: ${{ matrix.args }}

      - name: Embed QuickLook extension + verify universal bundle
        if: matrix.platform == 'macos-latest'
        run: |
          node scripts/macos-embed-appex.mjs --target ${{ matrix.df_build_triple }}
          node scripts/verify-universal-bundle.mjs

      - name: Install AppStream + desktop-file validators
        if: matrix.build_kind == 'flatpak'
        run: sudo apt-get install -y appstream desktop-file-utils

      - name: Install Flatpak build tooling
        if: matrix.build_kind == 'flatpak'
        run: sudo apt-get install -y flatpak flatpak-builder

      - name: Prepare XDG runtime directory
        if: matrix.build_kind == 'flatpak'
        run: |
          mkdir -p "$RUNNER_TEMP/xdg-runtime"
          chmod 700 "$RUNNER_TEMP/xdg-runtime"
          echo "XDG_RUNTIME_DIR=$RUNNER_TEMP/xdg-runtime" >> "$GITHUB_ENV"

      - name: Configure Flathub remote
        if: matrix.build_kind == 'flatpak'
        run: |
          flatpak remote-add --user --if-not-exists \
            flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install Flatpak runtime dependencies (user)
        if: matrix.build_kind == 'flatpak'
        run: |
          flatpak --user install -y --noninteractive flathub \
            org.freedesktop.Sdk//24.08 \
            org.freedesktop.Platform//24.08

      - name: Build Tauri app (CEF variant on Linux)
        if: matrix.build_kind == 'flatpak'
        run: node scripts/tauri-build.mjs --target x86_64-unknown-linux-gnu --no-bundle

      - name: Rename installer artifact
        if: matrix.build_kind == 'tauri' && (matrix.platform == 'macos-latest' || matrix.platform == 'windows-latest')
        shell: bash
        env:
          SAFE_BRANCH: ${{ needs.derive.outputs.safe_branch }}
          COMMIT_HASH: ${{ needs.derive.outputs.commit_hash }}
          VERSION: ${{ needs.derive.outputs.version }}
        run: |
          nightly_tag="${SAFE_BRANCH}_${COMMIT_HASH}_${VERSION}_DragonFruit_nightly"

          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            src="src-tauri/target/*/release/bundle/dmg/*.dmg"
            dst="${nightly_tag}.dmg"
          else
            src="src-tauri/target/*/release/bundle/nsis/*-setup.exe"
            dst="${nightly_tag}.exe"
          fi

          # There should be exactly one match
          for f in $src; do
            mv -v "$f" "$(dirname "$f")/$dst"
          done

      - name: Rename flatpak artifact
        if: matrix.build_kind == 'flatpak'
        shell: bash
        env:
          SAFE_BRANCH: ${{ needs.derive.outputs.safe_branch }}
          COMMIT_HASH: ${{ needs.derive.outputs.commit_hash }}
          VERSION: ${{ needs.derive.outputs.version }}
        run: |
          nightly_tag="${SAFE_BRANCH}_${COMMIT_HASH}_${VERSION}_DragonFruit_nightly"

          src="src-tauri/target/release/bundle/flatpak/*.flatpak"
          dst="${nightly_tag}.flatpak"

          for f in $src; do
            mv -v "$f" "$(dirname "$f")/$dst"
          done

      - name: Upload installer artifact
        if: matrix.build_kind == 'tauri' && (matrix.platform == 'macos-latest' || matrix.platform == 'windows-latest')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.platform == 'macos-latest' && 'src-tauri/target/*/release/bundle/dmg/*_DragonFruit_nightly.dmg' || 'src-tauri/target/*/release/bundle/nsis/*_DragonFruit_nightly.exe' }}
          if-no-files-found: error

      - name: Upload flatpak artifact
        if: matrix.build_kind == 'flatpak'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/release/bundle/flatpak/*_DragonFruit_nightly.flatpak
          if-no-files-found: error

  # ── Publish nightly prerelease ──────────────────────────────────────────
  publish-nightly:
    name: Publish nightly prerelease
    needs:
      - derive
      - build-tauri
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Remove old nightly release if exists
        uses: actions/github-script@v7
        env:
          TAG: ${{ needs.derive.outputs.release_tag }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.TAG;

            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              console.log(`Found existing release id=${release.id}, deleting...`);
              await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id });

              try {
                await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
                console.log(`Deleted tag ${tag}`);
              } catch (e) {
                if (e.status !== 422) throw e;
                console.log(`Tag ${tag} did not exist (422).`);
              }
            } catch (e) {
              if (e.status === 404) {
                console.log(`No existing release for tag ${tag}, clean slate.`);
              } else {
                throw e;
              }
            }

      - name: Create tag
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ needs.derive.outputs.release_tag }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.TAG_NAME;

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha
            });

      - name: Publish nightly prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.derive.outputs.release_tag }}
          name: ${{ needs.derive.outputs.release_name }}
          body: |
            🌙 **Nightly build** from branch \`${{ needs.derive.outputs.branch }}\`

            | Attribute | Value |
            |---|---|
            | Version | ${{ needs.derive.outputs.version }} |
            | Commit | ${{ needs.derive.outputs.commit_hash }} |
            | Branch | ${{ needs.derive.outputs.branch }} |

            ⚠️ This is an automated pre-release built from a feature branch. It is intended for testing purposes only.
          prerelease: true
          draft: false
          target_commitish: ${{ needs.derive.outputs.branch }}
          files: |
            release-assets/**/*

      - name: Comment on PR with release URL
        if: needs.derive.outputs.is_pr == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.derive.outputs.release_tag }}
          PR: ${{ needs.derive.outputs.pr_number }}
          NAME: ${{ needs.derive.outputs.release_name }}
        run: |
          release_url="https://github.com/${{ github.repository }}/releases/tag/${TAG}"
          gh issue comment "$PR" \
            --repo "${{ github.repository }}" \
            --body $'### ✅ Nightly Build Complete\n\n**'"${NAME}"$'** is ready for download.\n\n| | |\n|---|---|\n| 📦 **Release** | ['"${TAG}"$']('"${release_url}"$') |\n| 🖥️ **Platforms** | Windows, macOS, Linux |\n\n---\n\n> 💡 The next commit pushed to this PR will automatically rebuild and update this release.'
